<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NpureStudio - AI画像編集</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <header>
        <h1>NpureStudio</h1>
        <nav>
            <button id="try-on-btn">試着</button>
            <button id="generate-btn">生成</button>
        </nav>
    </header>

    <main>
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <canvas id="mask-canvas"></canvas>
        </div>
        <div id="controls">
            <input type="file" id="image-upload" accept="image/*" multiple>
            <button id="segment-btn">セグメンテーション</button>
            <button id="process-btn">処理開始</button>
        </div>
        <div id="status">準備完了</div>
    </main>

    <footer>
        <p>iPhone NPU 搭載 AI画像編集アプリ</p>
    </footer>

    <!-- Transformers.js is imported in app.js -->

    <script type="module" src="src/app.js"></script>
</body>
</html>
