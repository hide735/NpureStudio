<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NpureStudio - AI画像編集</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <header>
        <h1>NpureStudio</h1>
        <p class="header-note">ステップ1: 人物写真と衣服写真を読み込む、ステップ2: セグメンテーション、ステップ3: 試着</p>
    </header>

    <main>
        <a href="/src/debug_model_loader.html">debug link</a>
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <canvas id="mask-canvas"></canvas>
        </div>
        <div id="controls">
            <label>人物写真<input type="file" id="person-upload" accept="image/*"></label>
            <label>衣服写真<input type="file" id="cloth-upload" accept="image/*"></label>
            <label id="debug-toggle-label"><input type="checkbox" id="debug-toggle"> デバッグモード（ログ出力）</label>
            <input type="text" id="inpaint-prompt" placeholder="Inpainting prompt (例: スタイリッシュなジャケット)" />
            <button id="segment-btn">1) セグメンテーション</button>
            <button id="try-on-btn">2) 試着</button>
            <button id="reset-btn">リセット</button>
        </div>
        <div id="status">準備完了</div>
    </main>

    <footer>
        <p>iPhone NPU 搭載 AI画像編集アプリ</p>
    </footer>

    <!-- Transformers.js is imported in app.js -->

    <script type="module" src="src/app.js"></script>
</body>
</html>
