<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Advanced Model Loader Debug — NpureStudio</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial, sans-serif; padding: 20px; line-height: 1.5; }
    label { display: block; margin: 8px 0; font-weight: bold; }
    input, select, button { margin: 4px 8px 4px 0; padding: 8px; }
    #log { width: 100%; height: 400px; background: #111; color: #00ff00; padding: 12px; overflow:auto; white-space:pre-wrap; font-family: monospace; font-size: 13px; border-radius: 4px; }
    .controls { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
    .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; background: #eee; margin-left: 10px; }
    h2 { border-bottom: 2px solid #333; padding-bottom: 5px; }
  </style>
</head>
<body>
  <h1>NpureStudio: Advanced Debugger</h1>
  <p>Task 03 (画像認識) の完了確認および Task 04 (SAM) の先行実装テスト用です。</p>

  <div class="controls">
    <div>
      <label>Quick Select:</label>
      <select id="modelSelect">
        <option value="">-- モデルを選択 --</option>
        <option value="Xenova/vit-gpt2-image-captioning">vit-gpt2 (成功済み)</option>
<!--        <option value="Xenova/blip-image-captioning-base">BLIP (Xenova版)</option> -->
        <option value="Xenova/slimsam-77-uniform">SAM (Standard版)(成功済み)</option>
<!--        <option value="Xenova/slid-vit-base-patch16">SAM (Xenova版)</option> -->
      </select>
    </div>

    <div>
      <label>Model ID:</label>
      <input id="modelId" style="min-width:350px" value="Xenova/vit-gpt2-image-captioning" />
    </div>

    <div>
      <label>Device:</label>
      <select id="deviceSelect">
        <option value="webgpu">WebGPU</option>
        <option value="wasm">WASM (CPU)</option>
      </select>
    </div>

    <div>
      <label>Task Type:</label>
      <select id="pipelineType">
        <option value="image-to-text">image-to-text</option>
        <option value="mask-generation">mask-generation (SAM)</option>
      </select>
    </div>
  </div>

  <div class="controls">
    <button id="fetchTestBtn" style="background:#e1f5fe">1. Fetch Test</button>
    <button id="loadBtn" style="background:#fff9c4">2. Load Model & Processor</button>
    <button id="runInferBtn" style="background:#c8e6c9">3. Run Inference</button>
  </div>

  <div style="margin-bottom: 20px;">
    <label>Test Image: <input type="file" id="imageInput" accept="image/*" /></label>
  </div>

  <h2>Debug Console</h2>
  <div id="log"></div>

  <script type="module">
    import * as transformers from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3';

    const $ = (id) => document.getElementById(id);
    const log = (...args) => {
      const msg = args.map(a => (typeof a === 'object' ? JSON.stringify(a, null, 2) : a)).join(' ');
      const time = new Date().toLocaleTimeString();
      $('log').textContent += `[${time}] ${msg}\n`;
      $('log').scrollTop = $('log').scrollHeight;
    };

    // グローバルインスタンス保持
    let currentModel = null;
    let currentProcessor = null;
    let currentPipeline = null;

    // 要素の取得
    const modelInput = $('modelId');
    const modelSelect = $('modelSelect');
    const pipelineType = $('pipelineType');
    const deviceSelect = $('deviceSelect');

    // デバイス判定のロジックを強化
    const getDevice = async () => {
      if (navigator.gpu) {
        log('Gpu found. Checking WebGPU availability...');
        try {
          // 実際にアダプターが取得できるかチェック
          const adapter = await navigator.gpu.requestAdapter();
          log('WebGPU adapter:', adapter);
          if (adapter) return 'webgpu';
        } catch (e) {
          console.warn("WebGPU found but failed to initialize:", e);
        }
      }
      else {
        log('WebGPU not supported in this browser.');
      }
      return 'wasm'; // WebGPUがダメならWASM（CPU）にフォールバック
    };    

    // 1. セレクトボックス連動
    modelSelect.addEventListener('change', (e) => {
      if (e.target.value) {
        modelInput.value = e.target.value;
        log('Model changed to:', e.target.value);
        // SAM系ならTask Typeを自動変更
        if (e.target.value.includes('sam') || e.target.value.includes('slid')) {
          pipelineType.value = 'mask-generation';
        } else {
          pipelineType.value = 'image-to-text';
        }
      }
    });

    // 2. Fetch Test (401回避策付き)
    $('fetchTestBtn').addEventListener('click', async () => {
      const model = modelInput.value.trim();
      const files = ['config.json', 'tokenizer.json', 'preprocessor_config.json'];
      log(`Starting fetch test for: ${model}...`);

      for (const f of files) {
        // キャッシュ・認証情報の残骸を回避するためにタイムスタンプを付与
        const url = `https://huggingface.co/${model}/resolve/main/${f}?nc=${Date.now()}`;
        try {
          const res = await fetch(url, { mode: 'cors', credentials: 'omit' });
          log(`${f} -> status=${res.status} ok=${res.ok}`);
        } catch (err) {
          log(`${f} -> Fetch Error:`, err.message);
        }
      }
    });

    // 3. Load Model (分割ロード & SAM対応)
    $('loadBtn').addEventListener('click', async () => {
      const modelId = modelInput.value.trim();
      // const device = deviceSelect.value;

      const device = await getDevice();
      log(`Using device: ${device}`);

      const type = pipelineType.value;

      log(`Preparing env for ${device}...`);
      transformers.env.allowLocalModels = false;
      transformers.env.allowRemoteModels = true;
      // 内部フェッチのオプションを強化
      transformers.env.fetch_options = {
        credentials: 'omit',
        mode: 'cors'
      };

      try {
        // 解放処理
        currentModel = null;
        currentProcessor = null;
        currentPipeline = null;

        if (type === 'mask-generation' || modelId.includes('sam')) {
          log('--- SAM Segmentaion Mode (Manual Load) ---');
          const dtype = device === 'webgpu' ? 'q8' : 'fp32';
          log(`Loading SamModel... ${device} : ${dtype}`);
          currentModel = await transformers.SamModel.from_pretrained(modelId, {
             device: device,
            // WASMの場合は fp16 が使えないため、dtypeも調整が必要
            dtype: dtype
          });
          log('Loading SamProcessor...');
          currentProcessor = await transformers.AutoProcessor.from_pretrained(modelId);
          log('SAM Components loaded successfully.');
        } else {
          log('--- Standard Pipeline Mode ---');
          currentPipeline = await transformers.pipeline(type, modelId, { device });
          log('Pipeline ready.');
        }
      } catch (err) {
        log('Load Failed:', err.message);
        console.error(err);
      }
    });

    // 4. Run Inference
    $('runInferBtn').addEventListener('click', async () => {
      const file = $('imageInput').files[0];
      if (!file) return log('画像を選択してください');
      if (!currentPipeline && !currentModel) return log('モデルをロードしてください');

      try {
        const url = URL.createObjectURL(file);
        const rawImage = await transformers.RawImage.fromURL(url);
        log(`Image loaded: ${rawImage.width}x${rawImage.height}`);

        if (currentModel && currentProcessor) {
          log('Running SAM Inference (High-level)...');
          // 低レイヤーロード後の推論テスト
          const inputs = await currentProcessor(rawImage);
          log('Inputs generated. Keys: ' + Object.keys(inputs));
          // 2. テンソルの形状を確認（異常に大きくないか）
          if (inputs.pixel_values) {
            log('Pixel values shape: ' + inputs.pixel_values.dims);
          }

          log('Calling Model (Main Bottleneck)...');
          try {
            const outputs = await currentModel(inputs);
            
            log('Model finished successfully!');
            log('SAM inference done.');
            if (outputs.pred_masks) {
                log('Masks shape:', outputs.pred_masks.dims);
                log('Success: Task 04 Data Pipeline established.');
            }
          } catch (e) {
            log('Model call failed:', e.message);
            return;
          }
        } else if (currentPipeline) {
          log('Running Pipeline Inference...');
          const result = await currentPipeline(rawImage);
          log('Result:', result);
        }
      } catch (err) {
        log('Inference Error:', err.message);
      }
    });

    log('Advanced Debug page ready. version:', transformers.env.version);
  </script>
</body>
</html>
